<ion-header>
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (profile(); as p) {
    <ion-list inset="true">
      <ion-item>
        <ion-label>
          <h3>Name</h3>
          <ion-note>{{ p.name || '—' }}</ion-note>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <h3>Email</h3>
          <ion-note>{{ p.email || '—' }}</ion-note>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <h3>Subject</h3>
          <ion-note>{{ p.subject }}</ion-note>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <h3>Issuer</h3>
          <ion-note>{{ p.issuer }}</ion-note>
        </ion-label>
      </ion-item>
    </ion-list>

    <div class="actions ion-padding">
      <ion-button expand="block" (click)="goToPayments()">View Payments</ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="logout()">Logout</ion-button>
    </div>
  }
</ion-content>
