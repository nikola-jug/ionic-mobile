<ion-header>
  <ion-toolbar>
    <ion-title>BFF Mobile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="landing">
    <h1>Welcome</h1>
    <p>Sign in to continue</p>
    <div class="login-options">
      <ion-button expand="block" (click)="loginWithKeycloak()">Sign in with Keycloak</ion-button>
      <ion-button expand="block" fill="outline" (click)="loginWithAuthServer()">
        Sign in with Auth Server
      </ion-button>
    </div>
  </div>
</ion-content>
